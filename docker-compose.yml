services:
  init-permissions:
    image: busybox:1.36
    container_name: init-permissions
    user: "0:0"
    command: >
      sh -c "mkdir -p /workspace/n8n /workspace/data /workspace/qdrant /workspace/ollama &&
      chown -R 1000:1000 /workspace/n8n /workspace/data &&
      chown -R 1000:1000 /workspace/qdrant &&
      chown -R 0:0 /workspace/ollama"
    volumes:
      - ./storage/n8n:/workspace/n8n
      - ./storage/data:/workspace/data
      - ./storage/qdrant:/workspace/qdrant
      - ./storage/ollama:/workspace/ollama
    restart: "no"

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-local
    user: "1000:1000"
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
      - N8N_ENCRYPTION_KEY=replace-with-your-own-key
      - N8N_SECURE_COOKIE=false
      - N8N_METRICS=true
    volumes:
      - ./storage/n8n:/home/node/.n8n
      - ./storage/data:/data
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-local
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./storage/qdrant:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-local
    ports:
      - "11434:11434"
    volumes:
      - ./storage/ollama:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "sleep 8;
      ollama pull qwen2.5:7b-instruct-q4_K_M;
      ollama pull bge-m3;
      ollama pull nomic-embed-text"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  frontend:
    image: node:20-alpine
    container_name: frontend-local
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      n8n:
        condition: service_started
    restart: unless-stopped
