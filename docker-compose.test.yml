services:
  init-permissions:
    image: busybox:1.36
    container_name: init-permissions
    user: "0:0"
    command: >
      sh -c "mkdir -p /workspace/data /workspace/qdrant /workspace/ollama &&
      chown -R 1000:1000 /workspace/data &&
      chown -R 1000:1000 /workspace/qdrant &&
      chown -R 0:0 /workspace/ollama"
    volumes:
      - ./storage/data:/workspace/data
      - ./storage/qdrant:/workspace/qdrant
      - ./storage/ollama:/workspace/ollama
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: minio-local
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    volumes:
      - ./storage/minio:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until mc alias set local http://minio:9000 minioadmin minioadmin123; do sleep 2; done;
      mc mb -p local/rag-documents || true;
      mc anonymous set private local/rag-documents || true"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-local
    ports:
      - "8000:8000"
    environment:
      - DOC_DATA_ROOT=/data
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=rag_incident_docs
      - OBJECT_STORAGE_ENDPOINT=minio:9000
      - OBJECT_STORAGE_ACCESS_KEY=minioadmin
      - OBJECT_STORAGE_SECRET_KEY=minioadmin123
      - OBJECT_STORAGE_BUCKET=rag-documents
      - OBJECT_STORAGE_SECURE=false
      - OLLAMA_CHAT_MODEL=qwen2.5:1.5b-instruct-q4_K_M
      - OLLAMA_EMBED_MODEL=nomic-embed-text
    volumes:
      - ./storage/data:/data
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-local
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./storage/qdrant:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-local
    ports:
      - "11434:11434"
    volumes:
      - ./storage/ollama:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "/scripts/pull-ollama-models.sh"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_CHAT_MODEL=qwen2.5:1.5b-instruct-q4_K_M
      - OLLAMA_EMBED_MODEL=nomic-embed-text
    volumes:
      - ./scripts:/scripts:ro
    restart: "no"

  frontend:
    image: node:20-alpine
    container_name: frontend-local
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
